http = "1.2.0"
hyper = "1.6.0"

[dev-dependencies.tokio]
version = "1.43.0"
features = [ "full" ]

[dependencies]
axum = "0.8.1"
cookie_set = "0.1.4"
header_host = "0.1.1"
rand = "0.9.0"
tower = "0.5.2"
ub64 = "0.1.11"
xerr = "0.1.15"
xtld = "0.1.5"