syntax = "proto3";

message Call
{
  int32 func = 1;
  bytes args = 2;
}

message CallLi
{
  repeated int32 func_li = 1;
  repeated bytes args_li = 2;
}

message BinLi
{
  repeated bytes bin_li = 1;
}

message CodeBin
{
  uint32 code = 1;
  bytes bin = 2;
}

message Code
{
  uint32 code = 1;
}

message CodeLi
{
  repeated uint32 li = 1;
}

message CodeMsgLi
{
  repeated uint32 code_li = 1;
  repeated string msg_li = 2;
}

